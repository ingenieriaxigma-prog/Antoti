name: 🔒 Tests de Integridad de Datos

# Cuándo correr los tests automáticamente
on:
  # En cada push a estas ramas
  push:
    branches: 
      - main
      - master
      - develop
      - staging
  
  # En cada pull request hacia estas ramas
  pull_request:
    branches: 
      - main
      - master
      - develop
  
  # Manualmente desde GitHub UI
  workflow_dispatch:

# Cancelar ejecuciones anteriores si hay un nuevo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Tests de Integridad
  integrity-tests:
    name: Tests de Persistencia e Integridad
    runs-on: ubuntu-latest
    
    # Timeout total: 15 minutos
    timeout-minutes: 15
    
    steps:
      # 1. Checkout del código
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      # 2. Setup de Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # 3. Instalar dependencias
      - name: 📦 Instalar dependencias
        run: npm ci
      
      # 4. Verificar que Vitest está instalado
      - name: ✅ Verificar Vitest
        run: npx vitest --version
      
      # 5. Correr tests de integridad
      - name: 🧪 Correr Tests de Integridad
        run: npx vitest tests/integration/data-integrity --run --reporter=verbose
        env:
          # Variables de entorno desde GitHub Secrets
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      # 6. Generar reporte de cobertura (opcional)
      - name: 📊 Generar reporte de cobertura
        if: always()
        run: npx vitest tests/integration/data-integrity --run --coverage
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      # 7. Subir reporte de cobertura
      - name: 📤 Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
        continue-on-error: true
  
  # Job 2: Notificación de resultado
  notify-result:
    name: Notificar Resultado
    runs-on: ubuntu-latest
    needs: integrity-tests
    if: always()
    
    steps:
      - name: ✅ Tests PASARON
        if: needs.integrity-tests.result == 'success'
        run: |
          echo "🎉 ¡TODOS LOS TESTS PASARON!"
          echo "✅ La app está lista para deploy"
          echo "✅ Datos se guardan correctamente"
          echo "✅ Persistencia verificada"
      
      - name: ❌ Tests FALLARON
        if: needs.integrity-tests.result == 'failure'
        run: |
          echo "❌ ALGUNOS TESTS FALLARON"
          echo "🚨 NO HACER DEPLOY"
          echo "🐛 Hay bugs de persistencia de datos"
          echo "📝 Revisar los logs arriba"
          exit 1

# Protección de rama (opcional)
# Si quieres bloquear merges cuando los tests fallan:
# Settings → Branches → Branch protection rules → Require status checks to pass
